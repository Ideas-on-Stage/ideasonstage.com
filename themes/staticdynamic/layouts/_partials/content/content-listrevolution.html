{{/* <!-- generate list of past episodes --> */}}
<section id="previous-episodes" class="cl-content-listrevolution">
	<h2>{{ page.Params.episodes }}</h2>
	<ul>
	{{- $first := true -}}
	{{- range .Pages -}}
		{{/* <!-- if this is the first episode... --> */}}
		{{- if eq $first true -}}
			{{/* <!-- ...then skip it because it is already displayed in the hero --> */}}
			{{- $first = false -}}
		{{- else -}}
			{{/* <!-- ...else display episode in list --> */}}
		<li>
			<a href="{{ .RelPermalink }}">
				<img src="{{ .RelPermalink }}thumbnail.jpg" alt="{{ .Title }}">
				<h3>
					{{ .Title }}
				</h3>
				<p>
					{{ .Description }}
				</p>
			</a>
		</li>
		{{- end -}}
	{{- end -}}
	</ul>
</section>
